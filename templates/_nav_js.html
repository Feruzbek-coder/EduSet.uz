<script>
async function checkUser() {
    const res = await fetch('/api/user');
    const data = await res.json();
    if (!data.logged_in) {
        openUserModal(true);
    } else {
        _setNavUser(data.username);
    }
}
function _setNavUser(name) {
    const el1 = document.getElementById('nav-username');
    const el2 = document.getElementById('nav-avatar-letter');
    const el3 = document.getElementById('welcome-name');
    if (el1) el1.textContent = name;
    if (el2) el2.textContent = name.charAt(0).toUpperCase();
    if (el3) el3.textContent = name;
}
function openUserModal(required = false) {
    const modal = document.getElementById('user-modal');
    modal.style.display = 'flex';
    document.getElementById('user-modal-title').textContent =
        required ? 'Xush kelibsiz!' : 'Ismni o\'zgartirish';
    modal.onclick = required ? null : (e) => { if (e.target === modal) modal.style.display = 'none'; };
    setTimeout(() => document.getElementById('user-name-input').focus(), 80);
}
async function saveUserName() {
    const name = document.getElementById('user-name-input').value.trim();
    if (!name) {
        document.getElementById('user-name-input').style.borderColor = '#ef4444';
        document.getElementById('user-name-input').focus();
        return;
    }
    const res = await fetch('/api/user/set', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username: name })
    });
    const data = await res.json();
    if (data.success) {
        _setNavUser(data.username);
        document.getElementById('user-modal').style.display = 'none';
        if (typeof onUserSet === 'function') onUserSet(data.username);
    }
}
document.addEventListener('DOMContentLoaded', checkUser);
</script>
