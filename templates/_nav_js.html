<script>
// ── Foydalanuvchi nomi localStorage + server session da saqlanadi ─────────────
// Telegram Mini App har ochilganda server session yo'qoladi, lekin
// localStorage qoladi — shuning uchun avval localStorage ni tekshiramiz.

async function checkUser() {
    const res = await fetch('/api/user');
    const data = await res.json();

    if (data.logged_in) {
        // Server session bor — localStorage ni ham yangilab qo'yamiz
        _setNavUser(data.username);
        localStorage.setItem('eduset_username', data.username);
    } else {
        // Server session yo'q — localStorage dan qarashamiz
        const saved = localStorage.getItem('eduset_username');
        if (saved) {
            // Avtomatik tiklash — modal ko'rsatmasdan
            await _autoRestoreUser(saved);
        } else {
            // Birinchi marta — ism so'raymiz
            openUserModal(true);
        }
    }
}

async function _autoRestoreUser(name) {
    try {
        const res = await fetch('/api/user/set', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ username: name })
        });
        const data = await res.json();
        if (data.success) {
            _setNavUser(data.username);
            if (typeof onUserSet === 'function') onUserSet(data.username);
        } else {
            openUserModal(true);
        }
    } catch(e) {
        openUserModal(true);
    }
}

function _setNavUser(name) {
    const el1 = document.getElementById('nav-username');
    const el2 = document.getElementById('nav-avatar-letter');
    const el3 = document.getElementById('welcome-name');
    if (el1) el1.textContent = name;
    if (el2) el2.textContent = name.charAt(0).toUpperCase();
    if (el3) el3.textContent = name;
}
function openUserModal(required = false) {
    const modal = document.getElementById('user-modal');
    modal.style.display = 'flex';
    document.getElementById('user-modal-title').textContent =
        required ? 'Xush kelibsiz!' : 'Ismni o\'zgartirish';
    modal.onclick = required ? null : (e) => { if (e.target === modal) modal.style.display = 'none'; };
    setTimeout(() => document.getElementById('user-name-input').focus(), 80);
}
async function saveUserName() {
    const name = document.getElementById('user-name-input').value.trim();
    if (!name) {
        document.getElementById('user-name-input').style.borderColor = '#ef4444';
        document.getElementById('user-name-input').focus();
        return;
    }
    const res = await fetch('/api/user/set', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username: name })
    });
    const data = await res.json();
    if (data.success) {
        localStorage.setItem('eduset_username', data.username);
        _setNavUser(data.username);
        document.getElementById('user-modal').style.display = 'none';
        if (typeof onUserSet === 'function') onUserSet(data.username);
    }
}
document.addEventListener('DOMContentLoaded', checkUser);
</script>
<script>
// ── Hamburger / mobil menyu ──────────────────────────────────────────────────
function toggleMobileMenu() {
    const menu = document.getElementById('nav-mobile-menu');
    const btn  = document.getElementById('nav-hamburger-btn');
    const isOpen = menu.classList.contains('open');
    if (isOpen) {
        menu.classList.remove('open');
        btn.classList.remove('open');
        document.body.style.overflow = '';
    } else {
        menu.classList.add('open');
        btn.classList.add('open');
        document.body.style.overflow = 'hidden';
    }
}
function closeMobileMenuOnOverlay(e) {
    if (e.target === document.getElementById('nav-mobile-menu')) {
        toggleMobileMenu();
    }
}
// Sahifa o'zgarsa menyuni yop
document.addEventListener('DOMContentLoaded', function() {
    document.querySelectorAll('#nav-mobile-menu a').forEach(function(link) {
        link.addEventListener('click', function() {
            const menu = document.getElementById('nav-mobile-menu');
            const btn  = document.getElementById('nav-hamburger-btn');
            menu.classList.remove('open');
            btn.classList.remove('open');
            document.body.style.overflow = '';
        });
    });
});
</script>
<script>
function openFeedbackModal() {
    document.getElementById('feedback-text').value = '';
    document.getElementById('feedback-success').style.display = 'none';
    document.getElementById('feedback-submit-btn').style.display = 'block';
    const m = document.getElementById('feedback-modal');
    m.style.display = 'flex';
    setTimeout(() => document.getElementById('feedback-text').focus(), 80);
}
function closeFeedbackModal() {
    document.getElementById('feedback-modal').style.display = 'none';
}
document.addEventListener('DOMContentLoaded', function() {
    document.getElementById('feedback-modal').addEventListener('click', function(e) {
        if (e.target === this) closeFeedbackModal();
    });
});
async function submitFeedback() {
    const text = document.getElementById('feedback-text').value.trim();
    const type = document.getElementById('feedback-type').value;
    if (!text) {
        document.getElementById('feedback-text').style.borderColor = '#ef4444';
        document.getElementById('feedback-text').focus();
        return;
    }
    document.getElementById('feedback-text').style.borderColor = '#e5e7eb';
    const btn = document.getElementById('feedback-submit-btn');
    btn.textContent = '⏳ Yuborilmoqda...';
    btn.disabled = true;
    try {
        await fetch('/api/feedback', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ type, text, page: window.location.pathname })
        });
    } catch(e) {}
    btn.style.display = 'none';
    document.getElementById('feedback-success').style.display = 'block';
    setTimeout(closeFeedbackModal, 2000);
}
</script>
